<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | BKDziti Store</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="../https://07dd3bda0395dedea87dba9a09def0da.r2.cloudflarestorage.com/media/images/favicon.svg">
    <link rel="shortcut icon" href="../https://07dd3bda0395dedea87dba9a09def0da.r2.cloudflarestorage.com/media/images/favicon.ico">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Golos+Text:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/store.css">
</head>
<body>

    <canvas id="bgPulse"></canvas>
    <div id="notificationOverlay" class="notification-overlay"></div>
    <div id="notificationBanner"  class="notification-banner"></div>

    <button id="menuTrigger" class="menu-trigger" aria-label="Open navigation">
        <i class="fas fa-bars"></i>
    </button>
    <div id="sidePanelBackdrop" class="side-panel-backdrop"></div>
    <aside id="sidePanel" class="side-panel" aria-label="Site navigation">
        <div class="side-panel-inner">
            <img src="../https://07dd3bda0395dedea87dba9a09def0da.r2.cloudflarestorage.com/media/images/BKDziti_pfp_2.PNG" alt="BKDziti logo" class="panel-logo-img" width="80" height="80" loading="eager">
            <h2 class="panel-name">BKDziti</h2>
            <p class="panel-tagline">ベイクドジーティ</p>
            <hr class="panel-divider">
            <nav class="panel-nav" id="panelNav" aria-label="Main"></nav>
            <div class="panel-socials" id="panelSocials"></div>
            <div class="panel-footer">&copy; 2026 BKDziti LLC &middot; All Rights Reserved</div>
        </div>
    </aside>

    <main>
        <div class="store-page-header">
            <div class="hero-eyebrow">Order History</div>
            <h1>My <span>Orders</span></h1>
            <p>Enter the email address you used at checkout to see your order history.</p>
        </div>

        <div class="store-main" style="max-width:700px">
            <form class="order-lookup-form" id="orderLookupForm" novalidate>
                <input
                    type="email"
                    placeholder="your@email.com"
                    autocomplete="email"
                    required
                    aria-label="Your email address"
                >
                <button type="submit" class="pill-btn" style="margin-top:0;white-space:nowrap">
                    Look Up <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div id="ordersResult"></div>
        </div>
    </main>

    <!-- Floating cart -->
    <div class="cart-icon-wrap">
        <a href="cart.html" class="cart-icon-btn" aria-label="View cart">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-badge" id="cartBadge"></span>
        </a>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-logo">&bull; ベイクドジーティ &bull;</div>
            <nav class="footer-nav">
                <a href="../index.html">Home</a> &middot;
                <a href="index.html">Store</a> &middot;
                <a href="../contact.html">Contact</a>
            </nav>
            <div class="footer-socials" id="footerSocials"></div>
            <p class="footer-copy">&copy; 2026 BKDziti LLC &middot; All Rights Reserved</p>
        </div>
    </footer>

    <script>
        window.PAGE_CONFIG = {
            sections: [],
            nav: {
                before: [{ label: 'Home', href: '../index.html#hero' }],
                after: [
                    { label: '─────────────', href: '#' },
                    { label: 'Store Home',  href: 'index.html' },
                    { label: 'My Cart',     href: 'cart.html' },
                    { label: 'My Orders',   href: 'orders.html' },
                    { label: '─────────────', href: '#' },
                    { label: 'Contact',     href: '../contact.html#hero' }
                ]
            }
        };
    </script>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/site.js"></script>
    <script src="../assets/js/store.js"></script>

</body>
</html>
