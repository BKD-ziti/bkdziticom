<!DOCTYPE html>

<body>

    <canvas id="bgPulse"></canvas>

    <!-- ── Notification ── -->
    <div id="notificationOverlay" class="notification-overlay"></div>

    <!-- ── Menu trigger + side panel ── -->
    <button id="menuTrigger" class="menu-trigger" aria-label="Open navigation">

    </button>
    <div id="sidePanelBackdrop" class="side-panel-backdrop"></div>
    <aside id="sidePanel" class="side-panel" aria-label="Site navigation">
        <div class="side-panel-inner">
            <img src="assets/images/BKDziti_pfp_2.PNG" alt="BKDziti logo" class="panel-logo-img">
            <h2 class="panel-name">BKDziti</h2>
            <p class="panel-tagline">Resume · Cover Letter</p>
            <hr class="panel-divider">

            <div class="panel-socials" id="panelSocials"></div>

    <main>

        <!-- ── HERO ── -->
        <section class="hero" id="hero">
            <div class="hero-bg-ring"></div>

                    <span class="word-bkd">BKD</span><span class="word-ziti">ziti</span>
                </h1>
                <p class="hero-sub reveal">
                    Resume and cover letter — everything in one place.
                </p>
                <div id="heroSocials" class="hero-socials reveal"></div>
                <button id="scrollToAbout" class="hero-scroll-hint reveal" aria-label="Scroll to resume">
                    <i class="fas fa-chevron-down"></i>
                </button>
            </div>
        </section>

        <!-- ── Content sections (Resume + Cover Letter) ── -->
        <div id="contentSections"></div>

    </main>

    <!-- ── FOOTER ── -->
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-logo">• ベイクドジーティ •</div>
            <div class="footer-socials" id="footerSocials"></div>
            <p class="footer-copy">© Copyright 2025 BKDziti LLC · All Rights Reserved</p>
        </div>
    </footer>

    <!-- ── Page configuration & shared scripts ── -->
    <script>
        window.PAGE_CONFIG = {
            sections: [
                {
                    id: 'about',
                    label: 'Resume',
                    title: 'Resume & Background',

                    mediaType: 'pdf',
                    align: 'left',
                    button: { text: 'Download Resume', url: 'assets/images/AZ_resume.pdf', download: true, target: '_blank' },
                    palette: [
                        [255, 154, 11,  0.18],
                        [249, 234, 202, 0.12],
                        [255, 242, 194, 0.10],
                        [188, 149, 117, 0.14]

                },
                {
                    id: 'cover-letter',

                        [231, 54,  2,   0.18],
                        [255, 154, 11,  0.10]
                    ]
                }
            ],

            // Side panel nav: section links are auto-generated from `sections`.
            nav: {
                before: [{ label: 'Home', href: '#hero' }],
                after:  [
                    { label: 'Main Site', href: 'index.html' },
                    { label: 'Email',     href: 'mailto:AlexZornes@BKDziti.com' }
